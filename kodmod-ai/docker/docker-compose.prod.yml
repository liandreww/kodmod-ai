services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - kodmod-pgdata:/var/lib/postgresql/data
      - ./pg_init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4g

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--maxmemory", "1gb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - kodmod-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  api:
    image: ${KODMOD_IMAGE:-kodmod/api:latest}
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      ENV: prod
      LOG_JSON: "true"
    volumes:
      - kodmod-audio:/var/lib/kodmod/audio
      - kodmod-uploads:/var/lib/kodmod/uploads
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 6g

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - kodmod-caddydata:/data
      - kodmod-caddyconfig:/config
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - kodmod-prom:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:latest
    restart: always
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - kodmod-grafana:/var/lib/grafana

volumes:
  kodmod-pgdata:
  kodmod-redisdata:
  kodmod-audio:
  kodmod-uploads:
  kodmod-caddydata:
  kodmod-caddyconfig:
  kodmod-prom:
  kodmod-grafana:
